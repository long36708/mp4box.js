<html lang="zh">
    <head>
		<title>分片 MP4 文件播放器</title>
		<script src="../src/log.js"></script>
		<script src="eme.js"></script>
		<script src="segment-player.js"></script>
    </head>
	<body>
		<h1>MP4 分片播放器</h1>
		<p>此页面用于测试目的。它允许使用 <a href="https://www.w3.org/TR/media-source/">HTML Media Source Extension</a> 播放分片 MP4 文件</p>
		<p>使用方法:</p>
		<ul>
			<li>设置文件的 MIME 类型,</li>
			<li>如果文件已加密,请勾选复选框并设置加密密钥 <br>注意:只有文件包含 <a href="https://w3c.github.io/encrypted-media/format-registry/initdata/cenc.html#common-system">Common System ID pssh</a> 时才能播放</li>
			<li>点击初始化按钮</li>
			<li>加载或拖放您的文件,以便将其附加到 SourceBuffer</li>
		</ul>
		<p>注意:不会上传任何内容到服务器。所有处理均在您的浏览器中完成</p>
		<div>
			<p><label>MIME 类型: <input text="type" name="mime" id="mime" style="width: 50%;" value='video/mp4; codecs="avc1.640029"'></label></p>
			<p><label>加密密钥 (16 字节十六进制): <input type="checkbox" name="encryption_enabled" id="encryption_enabled"> <input text="type" name="key" id="key" style="width: 50%;" value='00000000000000000000000000000000'></label></p>
			<p><button onclick="initializeMSEEME()">初始化 MSE/EME (ClearKey DRM 系统)</button></p>
			<div id='dropArea' style="width: 100%; height: 10%; background-color: lightgrey">
			<input id="fileinput" type="file" onchange='drop()'> 或将分片拖放此处</input>
			<div id="status">尚未加载分片</div>
			</div>
			<video id="v" width="640" height="480" autoplay controls> </video>
		</div>
	</body>
</html>
