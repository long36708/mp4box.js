<!DOCTYPE html>
<html lang="zh">
    <head>
    	<meta charset="UTF-8">
		<title>MP4Box.js - JavaScript MP4 读取器/分段器</title>

		<!-- Include basic JQuery and JQuery UI files -->
		<script src="lib/jquery/jquery.js"></script>
  		<link href="lib/jquery-ui/jquery-ui.min.css" rel="stylesheet" type="text/css">
		<script src="lib/jquery-ui/jquery-ui.min.js"></script>
		<script src="lib/jquery-ui/jquery-ui.slider.custom.js"></script>

		<!-- Include JQuery-based Fancytree skin, library, and extensions -->
  		<link href="lib/fancytree/ui.fancytree.min.css" rel="stylesheet" type="text/css">
  		<script src="lib/fancytree/jquery.fancytree-all.min.js" type="text/javascript"></script>

  		<script type="text/javascript" src="lib/d3/d3.js"></script>

		<style type="text/css">
		.box{
			background-color:gray;
			height:200px;
			width:250px;
			margin-top:120px;
			margin-left:500px;
			border:1px ridge #aaa;
			-moz-box-shadow: 10px 10px 10px #212121;
			-webkit-box-shadow: 10px 10px 10px #212121;
			box-shadow: 10px 10px 10px #212121;
		}

		table, td, th {
			text-align: left;
			vertical-align: text-top;
			border-spacing: 0;
			border: 0;
			border-collapse: collapse;
		}

		td:first-child { width: 20%; }

		ul.fancytree-container {
		  height: 100vh;
		  width:  100%;
		  overflow: auto;
		  position: relative;
		}

		/* D3 Treemap styles */
		#treemap {
		  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
		  margin: auto;
		  position: relative;
		  width: 960px;
		}

		.node {
		  border: solid 1px white;
		  font: 10px sans-serif;
		  line-height: 12px;
		  overflow: hidden;
		  position: absolute;
		  text-indent: 2px;
		}

		.chart {
		  display: block;
		  margin: auto;
		  font-size: 11px;
		}

		rect {
		  stroke: #eee;
		  fill: #aaa;
		  fill-opacity: .8;
		}

		rect.parent {
		  cursor: pointer;
		  fill: steelblue;
		}

		text {
		  pointer-events: none;
		}

		.axis path,
		.axis line {
		  fill: none;
		  stroke: #000;
		  shape-rendering: crispEdges;
		}

		.x.axis path {
		}

		.area.above {
		  fill: rgb(252,141,89);
		}

		.area.below {
		  fill: rgb(145,207,96);
		}

		.line {
		  fill: none;
		  stroke: #000;
		  stroke-width: 1px;
		}

		.ui-selectmenu-button {
		    vertical-align: middle;
		}

		.inner-table {
			width: unset;
			margin: 0;
		}

		#expandall, #collapseall {
			margin: 0 0 0 2px;
			padding: 0 2px;
			font-size: 8px;
			writing-mode: vertical-rl;
			vertical-align: middle;
		}
		</style>
		<link rel="stylesheet" href="style.css" />
    </head>
	<body>
		<!-- GitHub Stat Buttons -->
		<div style="display: flex; align-items: center; justify-content: space-between;">
			<div>
				<h3 style="margin-bottom: 0;">MP4Box.js / ISOBMFF Box 结构查看器 (参见 <a href="./">其他演示</a>)</h3>
				<p style="margin-top: 4px;">客户端工具：文件在您的浏览器中本地处理，不会上传到任何服务器</p>
			</div>
		</div>

		<div id="menubar" style="clear: both;"></div>
		<div id="resulttabs" style="clear: both;">
		  <ul>
		    <li><a href="#movieview">文件概览</a></li>
		    <li><a href="#boxview">Box 视图</a></li>
		    <li><a href="#sampleview">Sample 视图</a></li>
		    <li><a href="#itemview">Item 视图</a></li>
		    <li><a href="#entitygroupview">Entity Group 视图</a></li>
		    <li><a href="#segmentview">Segment 视图</a></li>

		  </ul>
			<div id="movieview">
			</div>
			<div id="boxview">
				<ul>
					<li><a href="#boxtreeview">树状视图</a></li>
					<li><a href="#boxpartitionview">分区视图</a></li>
					<li><a href="#boxmapview">树状图视图</a></li>
				</ul>
				<div id="boxtreeview">
					<table>
						<thead>
							<tr>
								<th>Box 树状视图
									<button id="expandall" title="Expand all">&#9650;&#9660;</button>
									<button id="collapseall" title="Collapse all">&#9660;&#9650;</button>
								</th>
								<th>Box 属性视图</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td style="width: 30%">
									<div id="boxtree">
									</div>
								</td>
								<td>
									<div id="boxtable">
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
				<div id="boxpartitionview">
				</div>
				<div id="boxmapview">
				</div>
			</div>
			<div id="sampleview">
				<label>视图类型:<select name="sampleviewselector" id="sampleviewselector">
					<option selected="selected">Sample 表格</option>
					<option>Sample 图表</option>
					<option>Sample 映射</option>
					<option>Sample 时间轴</option>
				</select></label>
				<label>Track ID: <select id="trackSelect" name="trackSelect"></select></label>&nbsp;
				<label>编解码器: <input type="text" disabled id="trackinfo" style="width: 120px;"></label>&nbsp;
				<label>Sample 范围: <input type="text" disabled id="sample-range-value" style="width: 200px;"></label>
				<div id="sample-range"></div>
				<div>
					<div id="sampletable"></div>
					<div id="samplegraph"></div>
					<div id="samplemap"></div>
					<div id="sampletimeline"></div>
				</div>
			</div>
			<div id="itemview">
			</div>
			<div id="entitygroupview">
			</div>
			<div id="segmentview">
				<label>视图类型:<select name="segmentviewselector" id="segmentviewselector">
					<option selected="selected">Segment 表格</option>
					<option>Segment 图表</option>
				</select></label>
				<label>Segment 范围: <input type="text" disabled id="segment-range-value" style="width: 200px;"></label>
				<div id="segment-range"></div>
				<div>
					<div id="segmenttable"></div>
					<div id="segmentgraph"></div>
				</div>
			</div>
		</div>
		<script src="../dist/mp4box.all.global.js"></script>
		<script>
			for (const key in MP4Box)
				if (MP4Box.hasOwnProperty(key))
					window[key] = MP4Box[key];
		</script>
		<script src="sample-urls.js"></script>
		<script src="movieInfoDisplay.js"></script>
		<script src="boxHtmlTable.js"></script>
		<script src="boxfancytree.js"></script>
		<script src="filereader.js"></script>
		<script src="ui-helper.js"></script>
		<script src="downloader.js"></script>
	</body>
</html>
